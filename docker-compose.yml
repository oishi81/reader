# ===========================================
# myreader - 书源登录版 docker-compose 配置
# 部署到 iStoreOS (aarch64) 或任何 Docker 环境
# ===========================================

version: '3.8'

services:
  myreader:
    image: oishi1981/reader:latest
    container_name: myreader
    restart: unless-stopped
    ports:
      - "5012:8080"
    environment:
      - TZ=Asia/Shanghai
      - JAVA_OPTS=-Xms128m -Xmx384m -XX:+UseG1GC
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/reader3/getSystemInfo"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # iStoreOS 资源限制
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M