name: Build and Push Multi-Arch Docker Image

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 1: Build web separately, mount into Dockerfile.source
      - uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Build Web
        run: |
          cd web
          yarn --ignore-engines
          yarn build --ignore-engines
          cd ..
          mkdir -p src/main/resources/web
          cp -r web/dist/* src/main/resources/web/

      # Step 2: Build from source using Dockerfile.source (Docker will handle multi-stage build)
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.source
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            oishi1981/reader:latest
            oishi1981/reader:${{ github.sha }}