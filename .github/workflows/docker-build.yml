name: Build and Push Multi-Arch Docker Image

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Build Web
        run: cd web && yarn --ignore-engines && yarn build --ignore-engines && cd ..

      - name: Build JAR in Docker
        run: |
          docker run --rm -v $PWD:/app -w /app gradle:6.1.1-jdk8 sh -c '
            cp -r web/dist/* src/main/resources/web/
            rm -f src/main/java/com/htmake/reader/ReaderUIApplication.kt
            gradle -b cli.gradle assemble --no-daemon
          '
          mkdir -p docker-build/app/bin
          mv build/libs/*.jar docker-build/app/bin/reader.jar

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create Dockerfile
        run: |
          cat > docker-build/Dockerfile << 'DOCKERFILE'
          FROM eclipse-temurin:8-jre
          RUN apt-get update && apt-get install -y --no-install-recommends tini curl tzdata && ln -fs /usr/share/zoneinfo/Asia/Shanghai /etc/localtime && apt-get clean && rm -rf /var/lib/apt/lists/*
          ENV TZ=Asia/Shanghai JAVA_OPTS="-Xms128m -Xmx512m"
          EXPOSE 8080
          ENTRYPOINT ["/usr/bin/tini", "--"]
          COPY app/bin/reader.jar /app/bin/reader.jar
          CMD ["java", "-jar", "/app/bin/reader.jar"]
          DOCKERFILE

      - uses: docker/build-push-action@v5
        with:
          context: ./docker-build
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            oishi1981/reader:latest
            oishi1981/reader:${{ github.sha }}